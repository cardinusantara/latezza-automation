version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whatsapp_ai_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fardhan123}
      POSTGRES_DB: ${DB_NAME:-latezzacake}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  whatsapp-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_ai_gateway
    restart: always
    ports:
      - "${WHATSAPP_PORT:-3001}:3001"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-fardhan123}
      - DB_NAME=${DB_NAME:-latezzacake}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-latezza-automation.vercel.app}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
      - PUBLIC_REPORT_URL=${PUBLIC_REPORT_URL}
      - SHOPEE_DEFAULT_SEARCH_URL=${SHOPEE_DEFAULT_SEARCH_URL:-https://shopee.co.id/search?keyword=}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-10}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - WHATSAPP_PORT=${WHATSAPP_PORT:-3001}
      - RATE_LIMIT_MAX_MSG=${RATE_LIMIT_MAX_MSG:-5}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    volumes:
      # Persist the authenticated WhatsApp sessions across container restarts
      - ./backend/whatsapp-sessions:/usr/src/app/whatsapp-sessions

volumes:
  postgres_data:
